<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            background-color: lightgray;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: white;
            padding: 0px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .title-card {
            font-family: Arial, Helvetica, sans-serif;
            font-size: small;
        }

        .title-card p {
            font-size: smaller;
            color: gray;
        }

        .navigation {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 10px;
        }

        

        .started {
            background-color: white;
            color: dodgerblue;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .nav {
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
            color:gray;
            font-weight: bold;
            font-size: small;
        }

        .started {
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(36, 97, 239);
            color:white;
            font-weight: bold;
            font-size: small;
            padding: 9px;
        }

        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        form {
            margin-top: 5%;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: small;
        }

        label {
            font-weight: bold;
        }

        .input {
            width: 95%;
            padding: 8px;
            border-radius: 10px;
            border-width: 1px;
        }

        select {
            padding: 8px;
            width: 100%;
            border-radius: 10px;
        }

        p {
            margin-top: -12px;
            color: gray;
        }

        .remember {
            text-align: left;
            font-size: small;
            color: gray;
            font-weight: lighter;
        }

        .forgot {
            margin-left: 150px;
            text-decoration: none;
            color: rgb(36, 97, 239);
            font-size: small;
        }
        
        .buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 7px;
            gap: 10px;
            width: 100%;
        }        

        .login {
            width: 45%;
            padding: 10px;
            border-radius: 10px;
            background-color: rgb(36, 97, 239);
            color: white;
            font-weight: bold;
            border-color: rgb(36, 97, 239);
            border-width: 1px;
        }

        .register {
            width: 45%;
            padding: 10px;
            border-radius: 10px;
            border-width: 1px;
            border-color: gray;
            background-color: white;
            font-weight: bold;
            color: gray;
        }

        .account {
            text-align: center;
        }

        span {
            color: gray;
        }

        .create {
            color: purple;
        }

    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="title-card">
                <h2>Lay's Lab</h2>
                <p>Research Center</p>
            </div>
            <nav class="navigation">
                <a href="#" class="nav">Home</a>
                <a href="#" class="nav">Courses</a>
                <a href="#" class="nav">Resources</a>
                <a href="#" class="started">Get Started</a>
            </nav>
        </div>
    </header>
    
    <main>
        <div class="main-container">
        <form accept="true">
            <div class="body-card">
            <h2>Sign into Lay's Lab</h2>
            <p>Use your student account to access practice tasks and lessons.</p>
        </div>
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email" placeholder="yourname@school.edu" class="input"><br><br>

            <label for="email">Password</label><br>
            <input type="password" id="password" name="password" placeholder="Your password..." class="input"><br><br>

            <label for="Role">Role / Class</label><br>
            <select id="Role" name="Role">
                <option value="Student: Grade 11">Student: Grade 11</option>
                <option value="Student: Beginner">Student: Beginner</option>
                <option value="Student: Advanced">Student: Advanced</option>
                <option value="Student: Teacher/Instructor">Student: Teacher/Instructor</option>
            </select><br><br>
            <div class="remember"> 
                <label for="remember">Remember me</label>
                <input type="checkbox" id="remember" name="remember">
                <a href="#" class="forgot">Forgot password?</a><br>
            </div><br>
            <div class="buttons">
                <button type="Submit" class="login">Login</button>
                <button type="Reset" class="register">Register</button><br><br>
            </div><br>
            <div class="account">
                <span>Don't have an account? </span><a href="#" class="create">Create one</a>
            </div>
        </form>
        </div>
    </main>
</body>
</html>
