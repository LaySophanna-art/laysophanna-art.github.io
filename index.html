<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lay's Portfolio</title>
    <style>
        :root {
            --gap: 24px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-image: url("RobloxScreenShot20260315_125155301.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            color: white;
        }

        header {
            padding: 18px 2%;
        }

        .navigation {
            display: flex;
            gap: 30px;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .navigation a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 12px;
            border-radius: 8px;
        }

        .navigation a:hover {
            background: rgba(0, 0, 0, 0.6);
            cursor: pointer;
        }

        /* ===== main hero container ===== */
        main {
            height: calc(100vh - 86px);
            /* header space */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2%;
        }

        .Keeper {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            /* left and right pushed apart */
            align-items: center;
            gap: var(--gap);
        }

        .left {
            flex: 1 1 60%;
            min-width: 220px;
            margin-left: 2%;
        }

        .name h1 {
            margin: 0 0 8px 0;
            font-weight: 300;
            font-size: 3.2rem;
            line-height: 1.05;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        }

        .name h6 {
            margin: 6px 0 0 0;
            font-weight: 300;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .role {
            font-size: 2rem;
            font-weight: 300;
            display: inline-block;
            min-width: 220px;
            /* prevents jumping when text changes */
            transition: opacity 0.35s ease;
            color: white;
        }

        /* RIGHT (button) */
        .right {
            margin-right: 30px;
            flex: 0 0 auto;
            /* do not grow */
            display: flex;
            justify-content: flex-end;
            /* push button to the right edge of this block */
            align-items: center;
            padding-right: 2%;
            min-width: 160px;
        }

        .hire-btn {
            background-color: white;
            color: black;
            padding: 14px 34px;
            font-size: 1.05rem;
            border-radius: 12px;
            border: 0;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 700;
            transition: transform .2s ease, box-shadow .2s ease, background-color .2s ease, color .2s ease;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
        }

        .hire-btn:hover {
            transform: translateY(-4px);
            background-color: black;
            color: white;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.4);
        }

        /* ===== responsive (mobile) ===== */
        @media (max-width: 900px) {
            .Keeper {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 16px;
                padding: 24px 8px;
            }

            .left {
                margin-left: 0;
            }

            .name h1 {
                font-size: 2.0rem;
            }

            /* make heading smaller */
            .role {
                font-size: 1.4rem;
                min-width: auto;
            }

            .right {
                width: 100%;
                justify-content: center;
                /* center button on mobile */
                padding-right: 0;
                margin-top: 10px;
                /* give a little space above button */
            }

            .hire-btn {
                margin-top: 6px;
                padding: 12px 26px;
                font-size: 1rem;
            }
        }

        /* small tweak for very small screens */
        @media (max-width: 400px) {
            .name h1 {
                font-size: 1.6rem;
            }

            .role {
                font-size: 1.1rem;
            }

            .hire-btn {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul class="navigation">
                <li><a href="index.php">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="ScoreCalulator.php">Projects</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="Keeper">
            <!-- LEFT -->
            <div class="left">
                <div class="name">
                    <h1>Hello, I'm<br>Lay SoPhanNa,<br>a <span id="role" class="role">Web Developer</span>.</h1>
                    <h6>No face picture, sorry.</h6>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="right">
                <a href="#" class="hire-btn"
                    onclick="alert('Thank you! Please contact me at laysophanna@gmail.com'); return false;">
                    Hire Me
                </a>
            </div>
        </div>
    </main>

    <script>
        const roles = ["Web Developer", "Web Designer"];
        let currentIndex = 0;
        const roleElement = document.getElementById('role');

        function animateRole() {
            roleElement.style.opacity = 0;
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % roles.length;
                roleElement.textContent = roles[currentIndex];
                roleElement.style.opacity = 1;
            }, 350);
        }

        setInterval(animateRole, 3000);
    </script>
</body>

</html>
